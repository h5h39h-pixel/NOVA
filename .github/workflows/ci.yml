name: CI

# Runs on push / PR once this repo has a GitHub remote. Windows runner matches the
# app's platform (PowerShell, mss, pyautogui). No Ollama/ComfyUI in CI → endpoints that
# need them degrade gracefully; the live frontend gate auto-skips (no server).
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Quality gate (pyflakes + node --check + pytest)
        run: python scripts/check.py
